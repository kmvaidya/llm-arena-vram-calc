name: Update Leaderboard

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r arena_enrichment/requirements.txt

      - name: Install Playwright + Chromium
        run: playwright install --with-deps chromium

      - name: Run enrichment pipeline
        run: python arena_enrichment/enrich_arena.py --update-readme

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md arena_enrichment/output/
          git diff --cached --quiet || git commit -m "Update leaderboard tables [automated]"
          git push
