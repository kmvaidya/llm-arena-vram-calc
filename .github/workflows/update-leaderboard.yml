name: Update Leaderboard

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev 2>/dev/null || uv pip install -r arena_enrichment/requirements.txt pytest

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Run enrichment pipeline
        run: uv run python arena_enrichment/enrich_arena.py --update-readme

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md arena_enrichment/output/
          git diff --cached --quiet || git commit -m "Update leaderboard tables [automated]"
          git push

      - name: Create issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "Leaderboard update failed ($(date -u +%Y-%m-%d))" \
            --body "The daily leaderboard update workflow failed.\n\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nPlease check the logs for details." \
            --label "bug"
        env:
          GH_TOKEN: ${{ github.token }}
